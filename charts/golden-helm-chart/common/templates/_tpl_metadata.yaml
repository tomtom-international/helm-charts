{{- define "common.metadata" -}}
{{- $metadata := (mergeOverwrite (deepCopy .common) . (dict "common" .common)) -}}
{{- if $metadata.name }}
name: {{ tpl $metadata.name (dict "Values" .Values "Template" (dict "BasePath" "<inline>" "Name" "<noname>")) }}
{{- end }}
{{- if $metadata.labels }}
labels: {{- toYaml $metadata.labels | nindent 2 }}
{{- end }}
{{- if $metadata.annotations }}
annotations: {{- toYaml $metadata.annotations | nindent 2 }}
{{- end }}
{{- end }}
