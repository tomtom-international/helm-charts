{{- range $k, $v := .Values.deployments -}}
{{- $deployment := mergeOverwrite (deepCopy $.Values.common.deployment) $v (dict "name" $k "common" $.Values.common "Values" $.Values) -}}
{{- if and (not (eq $v nil)) ($deployment.autoscaling.enabled) }}
{{ tpl (include "common.hpa" (mergeOverwrite (deepCopy $.Values.common.hpa) $deployment.autoscaling (dict "name" $k "target" (dict "type" "Deployment" "name" $k) "common" $.Values.common "Values" $.Values))) (merge (dict "Template" (dict "BasePath" "<inline>" "Name" "<noname>")) $) }}
{{- end -}}
{{- end -}}

{{- range $k, $v := .Values.hpas -}}
{{- if not (eq $v nil) }}
{{ include "common.hpa" (mergeOverwrite (deepCopy $.Values.common.hpa) $v (dict "name" $k "common" $.Values.common "Values" $.Values)) }}
{{- end -}}
{{- end -}}
